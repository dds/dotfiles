# tmux configuration — ported from .screenrc + .screenrc.colors.v5.

# Prefix: Ctrl-Z (matches screen `escape ^Zz`). prefix+z sends literal C-z;
# prefix+C-z jumps to last window (screen's ^A^A equivalent).
unbind C-b
set -g prefix C-z
bind z send-prefix
bind C-z last-window

set -g history-limit 99999
set -s escape-time 150
set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm*:RGB"
set -sa terminal-features ",alacritty*:RGB"
set -sa terminal-features ",screen*:RGB"

set -g visual-bell on
set -g bell-action any
setw -g monitor-activity on
set -g visual-activity off
set -g mouse on

# Safer kill: require capital K with confirmation (matches screen's `bind 'K' kill`).
unbind &
bind K confirm-before -p "kill-window #W? (y/n)" kill-window
bind X confirm-before -p "kill-session #S? (y/n)" kill-session

# Status bar — two rows, palette from .screenrc.colors.v5.
set -g status on
set -g status-position bottom
set -g status 2
set -g status-style "bg=#333333,fg=#FFFFFF"
set -g status-left ""
set -g status-right ""
set -g status-left-length 0
set -g status-right-length 0

setw -g window-status-format "#[fg=#FFFFFF,bg=#333333] #I #W "
setw -g window-status-current-format "#[fg=#FFFF00,bold,bg=#333333] #I*#F #W "
setw -g window-status-activity-style "fg=#00AAAA,bg=#333333,bold"
setw -g window-status-separator ""

# Row 1 (above window list): hostname:session │ time date │ load.
set -g status-format[1] "#[fg=#FFFFFF,bg=#333333] #[fg=#999999]│ #[fg=#FFFF00,bold]#H#[nobold,fg=#FFFFFF]:#[fg=#FF00FF]#S #[fg=#999999]│ #[fg=#00FFFF,bold]%H:%M #[nobold,fg=#00AAAA]%Y-%m-%d #[fg=#999999]│#[align=right,fg=#00FF00] #(cut -d' ' -f1-3 /proc/loadavg) #[fg=#999999]│ "
